version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/gigshield
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    command: celery -A app.workers.celery_app worker -l info
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/gigshield
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A app.workers.celery_app beat -l info
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/gigshield
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=gigshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
